<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; }
        form { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        form input, form select { padding: 10px; flex: 1; min-width: 150px; border: 1px solid #ccc; border-radius: 4px; }
        form button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        form button.cancel { background-color: #6c757d; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; }
        .btn-edit { background-color: #ffc107; color: black; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-right: 5px;}
        .btn-delete { background-color: #dc3545; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        .btn-loan { background-color:#17a2b8; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px; }
        .section { display:none; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <h2>Student Management System (CRUD)</h2>
    <form id="studentForm">
        <input type="hidden" id="studentId">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="text" id="course" placeholder="Course" required>
        <button type="submit" id="submitBtn">Add Student</button>
        <button type="button" id="cancelBtn" class="cancel" style="display:none;" onclick="resetForm()">Cancel</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th><th>Name</th><th>Email</th><th>Course</th><th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTableBody"></tbody>
    </table>
</div>

<!-- Loan Workspace -->
<div id="loanSection" class="section container">
    <h2>Loan Workspace</h2>
    <button onclick="backStudents()">Back to Students</button>
    <form id="loanForm">
        <input type="number" id="loanAmount" placeholder="Amount" required>
        <select id="loanType">
            <option>Tuition</option><option>Books</option><option>Living Expenses</option>
        </select>
        <select id="loanStatus">
            <option>Pending</option><option>Approved</option><option>Disbursed</option>
        </select>
        <button type="submit">Add Loan</button>
    </form>
    <table>
        <thead><tr><th>Amount</th><th>Type</th><th>Status</th><th>Action</th></tr></thead>
        <tbody id="loanTable"></tbody>
    </table>
</div>

<!-- Payment Workspace -->
<div id="paymentSection" class="section container">
    <h2>Payment Workspace</h2>
    <button onclick="backLoans()">Back to Loans</button>
    <form id="paymentForm">
        <input type="number" id="paymentAmount" placeholder="Payment Amount" required>
        <input type="date" id="paymentDate" required>
        <select id="paymentMethod">
            <option>Cash</option><option>Bank Transfer</option><option>Online Payment</option>
        </select>
        <button type="submit">Add Payment</button>
    </form>
    <h3>Total Paid: <span id="totalPaid">0</span></h3>
    <h3>Remaining: <span id="remaining">0</span></h3>
    <table>
        <thead><tr><th>Date</th><th>Amount</th><th>Method</th></tr></thead>
        <tbody id="paymentTable"></tbody>
    </table>
</div>

<script>
    const API_URL = 'api.php';
    const form = document.getElementById('studentForm');
    const submitBtn = document.getElementById('submitBtn');
    const cancelBtn = document.getElementById('cancelBtn');

    document.addEventListener("DOMContentLoaded", fetchStudents);

    async function fetchStudents() {
        const response = await fetch(API_URL);
        const students = await response.json();
        const tbody = document.getElementById('studentTableBody');
        tbody.innerHTML = '';
        students.forEach(student => {
            tbody.innerHTML += `<tr>
                <td>${student.id}</td>
                <td>${student.name}</td>
                <td>${student.email}</td>
                <td>${student.course}</td>
                <td>
                    <button class="btn-edit" onclick="editStudent(${student.id}, '${student.name}', '${student.email}', '${student.course}')">Edit</button>
                    <button class="btn-delete" onclick="deleteStudent(${student.id})">Delete</button>
                    <button class="btn-loan" onclick="openLoans(${student.id})">Loans</button>
                </td>
            </tr>`;
        });
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('studentId').value;
        const payload = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            course: document.getElementById('course').value
        };
        let method = 'POST';
        if (id) { payload.id = id; method = 'PUT'; }

        const response = await fetch(API_URL, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const result = await response.json();
        alert(result.message || result.error);
        resetForm();
        fetchStudents();
    });

    function editStudent(id, name, email, course) {
        document.getElementById('studentId').value = id;
        document.getElementById('name').value = name;
        document.getElementById('email').value = email;
        document.getElementById('course').value = course;
        submitBtn.innerText = "Update Student";
        cancelBtn.style.display = "inline-block";
    }

    async function deleteStudent(id) {
        if (confirm("Delete this student?")) {
            await fetch(API_URL, { method: 'DELETE', body: JSON.stringify({ id }) });
            fetchStudents();
        }
    }

    function resetForm() {
        form.reset();
        document.getElementById('studentId').value = '';
        submitBtn.innerText = "Add Student";
        cancelBtn.style.display = "none";
    }

    // --- NEW NAVIGATION AND WORKSPACE LOGIC ---
    let currentStudent, currentLoan;

    function backStudents() {
        document.getElementById("loanSection").style.display = "none";
        document.getElementById("mainContainer").style.display = "block";
    }

    function backLoans() {
        document.getElementById("paymentSection").style.display = "none";
        document.getElementById("loanSection").style.display = "block";
    }

    function openLoans(id) {
        currentStudent = id;
        document.getElementById("mainContainer").style.display = "none";
        document.getElementById("loanSection").style.display = "block";
        loadLoans();
    }

    async function loadLoans() {
        let res = await fetch(`loans_api.php?action=list&student_id=${currentStudent}`);
        let loans = await res.json();
        let table = document.getElementById("loanTable");
        table.innerHTML = "";
        loans.forEach(l => {
            table.innerHTML += `<tr>
                <td>${l.amount}</td><td>${l.loan_type}</td><td>${l.status}</td>
                <td><button onclick="openPayments(${l.id})">Payments</button></td>
            </tr>`;
        });
    }

    document.getElementById("loanForm").onsubmit = async (e) => {
        e.preventDefault();
        await fetch("loans_api.php?action=add", {
            method: "POST",
            body: JSON.stringify({
                student_id: currentStudent,
                amount: document.getElementById("loanAmount").value,
                loan_type: document.getElementById("loanType").value,
                status: document.getElementById("loanStatus").value
            })
        });
        loadLoans();
    };

    document.getElementById("paymentForm").onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch("payments_api.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                loan_id: currentLoan,
                amount: document.getElementById("paymentAmount").value,
                payment_date: document.getElementById("paymentDate").value,
                payment_method: document.getElementById("paymentMethod").value
            })
        });
        const result = await res.json();
        if (result.error) alert(result.error);
        document.getElementById("paymentForm").reset();
        loadPayments();
    };

    function openPayments(id) {
        currentLoan = id;
        document.getElementById("loanSection").style.display = "none";
        document.getElementById("paymentSection").style.display = "block";
        loadPayments();
    }

    async function loadPayments() {
        let res = await fetch(`payments_api.php?action=list&loan_id=${currentLoan}`);
        let data = await res.json();
        document.getElementById("totalPaid").innerText = data.total_paid;
        document.getElementById("remaining").innerText = data.remaining_balance;
        let pTable = document.getElementById("paymentTable");
        pTable.innerHTML = "";
        data.payments.forEach(p => {
            pTable.innerHTML += `<tr><td>${p.payment_date}</td><td>${p.amount}</td><td>${p.payment_method}</td></tr>`;
        });
    }
</script>
</body>
</html>
